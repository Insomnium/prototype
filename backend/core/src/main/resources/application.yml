spring:
  application.name: core

  config.import: optional:configserver:http://localhost:8888

  datasource:
    url: ${POSTGRES_JDBC_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS}

  liquibase:
    change-log: classpath*:db/changelog/master.xml

  boot:
    admin:
      client:
        url: ${SBA_URL}

server:
  servlet:
    context-path: /core

app:
  integrations:
    topics:
      profiles:
        name: profile
  object-storage:
    connection-url: ${MINIO_BASE_URL}
    cdn-base-url: ${MINIO_BASE_URL}
    user: ${MINIO_USER}
    password: ${MINIO_PASSWORD}
    photo-bucket: profile-albums
    profile-photo-folder: profiles
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    client-id: PAGANBLACKER
    producer:
      key-serializer: org.apache.kafka.common.serialization.LongSerializer
      properties:
        schema.registry.url: ${KAFKA_SCHEMA_REGISTRY_URL}
        value.subject.name.strategy: io.confluent.kafka.serializers.subject.RecordNameStrategy
        auto.register.schemas: false
        use.latest.version: true
        schema.reflection: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
      group-id: cg-core.test
      properties:
        schema.registry.url: ${KAFKA_SCHEMA_REGISTRY_URL}
        auto.reset.offset: earliest
        enable.auto.commit: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    env:
      post:
        enabled: true
      show-values: always
    configprops:
      show-values: always
    health:
      show-details: ALWAYS
