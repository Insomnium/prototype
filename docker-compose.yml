services:
  postgres:
    container_name: postgres-prototype
    image: postgres:17.4-alpine3.21
    profiles:
      - all
      - db
      - keycloak
      - core
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${PWD}/etc/docker/postgres:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: ${CORE_PG_USER}
      POSTGRES_USER: ${CORE_PG_PASSWORD}
      POSTGRES_PASSWORD: ${CORE_PG_DATABASE}
      POSTGRES_HOST_AUTH_METHOD: ${CORE_PG_AUTH_METHOD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_core -d core_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  elasticsearch:
    image: elasticsearch:8.17.3
    container_name: elasticsearch
    profiles:
      - all
      - index
      - core
    environment:
      - node.name=elasticsearch
      - cluster.name=es-docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - http.cors.allow-origin=http://localhost:8085,http://paganblacker.internal:8085
      - http.cors.enabled=true
      - http.cors.allow-headers=X-Requested-With,X-Auth-Token,Content-Type,Content-Length,Authorization
      - http.cors.allow-credentials=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elastic
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

  kibana:
    image: kibana:8.17.3
    container_name: kibana
    restart: on-failure
    profiles:
      - all
      - index
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - elastic
    healthcheck:
      test: [ "CMD-SHELL", "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    depends_on:
      elasticsearch:
        condition: service_healthy

  elasticvue:
    image: cars10/elasticvue
    container_name: elasticvue
    restart: on-failure
    profiles:
      - all
      - index
    volumes:
      - "${PWD}/etc/docker/elasticvue_conf.json:/usr/share/nginx/html/api/default_clusters.json"
    ports:
      - "8085:8080"
    networks:
      - elastic
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:8080" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  broker:
    image: confluentinc/cp-server:7.9.0
    hostname: broker
    container_name: broker
    profiles:
      - all
      - kafka
      - core
      - chat
      - broker
    ports:
      - "9092:9092"
      - "9101:9101"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PAGANBLACKER_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092,PAGANBLACKER_HOST://paganblacker.internal:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_CONFLUENT_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_METRIC_REPORTERS: io.confluent.metrics.reporter.ConfluentMetricsReporter
      CONFLUENT_METRICS_REPORTER_BOOTSTRAP_SERVERS: broker:29092
      CONFLUENT_METRICS_REPORTER_TOPIC_REPLICAS: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092,PAGANBLACKER_HOST://0.0.0.0:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CONFLUENT_METRICS_ENABLE: 'true'
      CONFLUENT_SUPPORT_CUSTOMER_ID: 'anonymous'
      # Replace CLUSTER_ID with a unique base64 UUID using "bin/kafka-storage.sh random-uuid"
      # See https://docs.confluent.io/kafka/operations-tools/kafka-tools.html#kafka-storage-sh
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 5s
      retries: 5

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.0
    hostname: schema-registry
    container_name: schema-registry
    profiles:
      - all
      - kafka
      - core
    depends_on:
      - broker
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'broker:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://schema-registry:8081" ]
      interval: 10s
      timeout: 5s
      retries: 5

  schema-registry-init:
    image: curlimages/curl
    container_name: schema_registry_init
    profiles:
      - all
      - kafka
      - core
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ${PWD}/etc/docker/kafka/schema:/schema
    entrypoint: /bin/sh -c "/schema/register_schema.sh"

  cassandra-init:
    container_name: cassandra-init
    image: "cassandra:5.0.5"
    restart: on-failure
    profiles:
      - all
      - chat
      - cassandra
    depends_on:
      - cassandra-1
      - cassandra-2
      - cassandra-3
    networks:
      - cassandra-net
    volumes:
      - ${PWD}/etc/docker/cassandra/init-chat.cql:/init.cql
    command: /bin/bash -c "until cqlsh cassandra-1 -f /init.cql; do echo 'Waiting for cassandra readiness probe...'; sleep 2; done; echo 'Keyspaces have been initialized'"

  connect:
    image: cnfldemos/cp-server-connect-datagen:0.6.4-7.6.0
    hostname: connect
    container_name: connect
    profiles:
      - all
      - kafka
      - core
      - chat
    depends_on:
      - broker
      - schema-registry
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'broker:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 10000
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      # CLASSPATH required due to CC-2422
      CLASSPATH: /usr/share/java/monitoring-interceptors/monitoring-interceptors-7.9.0.jar
      CONNECT_PRODUCER_INTERCEPTOR_CLASSES: "io.confluent.monitoring.clients.interceptor.MonitoringProducerInterceptor"
      CONNECT_CONSUMER_INTERCEPTOR_CLASSES: "io.confluent.monitoring.clients.interceptor.MonitoringConsumerInterceptor"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/" ]
      interval: 30s
      timeout: 10s
      retries: 5

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.9.0
    hostname: control-center
    container_name: control-center
    profiles:
      - all
      - kafka
      - core
      - chat
    depends_on:
      - broker
      - schema-registry
      - connect
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'broker:29092'
      CONTROL_CENTER_CONNECT_CONNECT-DEFAULT_CLUSTER: 'connect:8083'
      CONTROL_CENTER_CONNECT_HEALTHCHECK_ENDPOINT: '/connectors'
      #      CONTROL_CENTER_KSQL_KSQLDB1_URL: "http://ksqldb-server:8088"
      CONTROL_CENTER_KSQL_KSQLDB1_ADVERTISED_URL: "http://localhost:8088"
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9021/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    container_name: keycloak
    command: start-dev --import-realm
    ports:
      - 9090:8080
    depends_on:
      - postgres
    profiles:
      - all
      - keycloak
      - core
      - chat
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_PG_USER}
      KC_DB_PASSWORD: ${KC_PG_PASSWORD}
      KC_LOG_LEVEL: info
      KC_METRICS_ENABLED: true
      KC_HEALTH_ENABLED: true
#      KEYCLOAK_ADMIN: admin
#      KEYCLOAK_ADMIN_PASSWORD: password
    volumes:
      - ${PWD}/etc/docker/keycloak/init-sample.json:/opt/keycloak/data/import/realm-export.json
#    healthcheck: # TODO: make an image with curl
#      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
#      interval: 30s
#      timeout: 10s
#      retries: 5

  minio:
    image: quay.io/minio/minio
    container_name: minio
    profiles:
      - all
      - cdn
      - core
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server --console-address ":9001" /data/
    environment:
      MINIO_ROOT_USER: ${MINIO_ADMIN_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ADMIN_PASSWORD}
    volumes:
      - minio_storage:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  cassandra-1:
    image: "cassandra:5.0.5"
    container_name: "cassandra-1"
    profiles:
      - all
      - cassandra
      - chat
    ports:
      - 7000:7000
      - 9042:9042
    networks:
      - cassandra-net
    restart: on-failure
    mem_limit: 2g
    environment:
      - CASSANDRA_START_RPC=true       # default
      - CASSANDRA_RPC_ADDRESS=0.0.0.0  # default
      - CASSANDRA_LISTEN_ADDRESS=auto  # default, use IP addr of container # = CASSANDRA_BROADCAST_ADDRESS
      - CASSANDRA_CLUSTER_NAME=my-cluster
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=prototype-dc1
      - MAX_HEAP_SIZE=1024M
    volumes:
      - cassandra-node-01:/var/lib/cassandra:rw
    healthcheck:
      test: ["CMD-SHELL", "[ $$(nodetool status | grep '^UN' | wc -l) -ge 1 ] || exit 1"]
      interval: 2m
      start_period: 2m
      timeout: 10s
      retries: 3

  cassandra-2:
    image: "cassandra:5.0.5"
    container_name: "cassandra-2"
    profiles:
      - all
      - cassandra
      - chat
    ports:
      - 9043:9042    
    networks:
      - cassandra-net
    restart: on-failure
    mem_limit: 2g
    environment:
      - CASSANDRA_START_RPC=true       # default
      - CASSANDRA_RPC_ADDRESS=0.0.0.0  # default
      - CASSANDRA_LISTEN_ADDRESS=auto  # default, use IP addr of container # = CASSANDRA_BROADCAST_ADDRESS
      - CASSANDRA_CLUSTER_NAME=my-cluster
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=prototype-dc1
      - CASSANDRA_SEEDS=cassandra-1
      - MAX_HEAP_SIZE=1024M
    depends_on:
      cassandra-1:
        condition: service_healthy
    volumes:
      - cassandra-node-02:/var/lib/cassandra:rw
    healthcheck:
      test: ["CMD-SHELL", "[ $$(nodetool status | grep '^UN' | wc -l) -ge 2 ] || exit 1"]
      interval: 2m
      start_period: 2m
      timeout: 10s
      retries: 3

  cassandra-3:
    image: "cassandra:5.0.5"
    container_name: "cassandra-3"
    profiles:
      - all
      - cassandra
      - chat
    ports:
      - 9044:9042
    networks:
      - cassandra-net
    restart: on-failure
    mem_limit: 2g
    environment:
      - CASSANDRA_START_RPC=true       # default
      - CASSANDRA_RPC_ADDRESS=0.0.0.0  # default
      - CASSANDRA_LISTEN_ADDRESS=auto  # default, use IP addr of container # = CASSANDRA_BROADCAST_ADDRESS
      - CASSANDRA_CLUSTER_NAME=my-cluster
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=prototype-dc1
      - CASSANDRA_SEEDS=cassandra-1
      - MAX_HEAP_SIZE=1024M
    depends_on:
      cassandra-2:
        condition: service_healthy
    volumes:
      - cassandra-node-03:/var/lib/cassandra:rw
    healthcheck:
      test: ["CMD-SHELL", "[ $$(nodetool status | grep '^UN' | wc -l) -ge 3 ] || exit 1"]
      interval: 2m
      start_period: 2m
      timeout: 10s
      retries: 3

  app-spring-boot-admin:
    image: insomnium/infra-spring-boot-admin-server:latest
    container_name: "app-spring-boot-admin-server"
    profiles:
      - all
      - app
    ports:
      - "1111:1111"
    environment:
      SBA_ADMIN_CLIENT_URL: http://localhost:11111
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:1111/actuator/health | grep 'UP'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  app-core:
    image: insomnium/core:latest
    container_name: "app-core"
    profiles:
      - all
      - app
    ports:
      - "8080:8080"
    networks:
      - default
      - elastic
    environment:
      SBA_URL: http://app-spring-boot-admin:1111
      POSTGRES_JDBC_URL: jdbc:postgresql://postgres:5432/core
      POSTGRES_USERNAME: app_core
      POSTGRES_PASSWORD: core_password
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      KAFKA_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      MINIO_BASE_URL: http://minio:9000
      MINIO_USER: admin
      MINIO_PASSWORD: password
    depends_on:
      app-spring-boot-admin:
        condition: service_healthy
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/core/actuator/health | grep 'UP'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  app-chat:
    image: insomnium/chat:latest
    container_name: "app-chat"
    profiles:
      - all
      - app
    ports:
      - "8082:8080"
    networks:
      - default
      - cassandra-net
    environment:
      SBA_URL: http://app-spring-boot-admin:1111
      CASSANDRA_DC: prototype-dc1
      CASSANDRA_CLUSTER: cassandra-1:9042,cassandra-2:9043,cassandra-3:9044
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      KAFKA_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CASSANDRA_JDBC_URL: jdbc:cassandra://cassandra-1:9042/chat?compliancemode=Liquibase&localdatacenter=prototype-dc1
    depends_on:
      app-spring-boot-admin:
        condition: service_healthy
      broker:
        condition: service_healthy
      cassandra-3:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep 'UP'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  elastic_data:
    driver: local
  postgres_data:
    driver: local
  cassandra-node-01:
  cassandra-node-02:
  cassandra-node-03:
  minio_storage:
    driver: local

networks:
  elastic:
    driver: bridge
  cassandra-net:
    driver: bridge

